sonar.projectKey=iurii-izman_replyline
sonar.organization=iurii-izman
sonar.sources=src,src-tauri/src,scripts
sonar.tests=src,tests
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,tests/**

# Keep analysis focused on real source artifacts.
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/reports/**,**/src-tauri/target/**,**/*.log
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,tests/**,scripts/**,src/app/locale.ts

# CPD exclusions for mirrored locale dictionaries and non-product scaffolding/tests.
sonar.cpd.exclusions=reports/**,tests/fixtures/**,src/app/locale.ts,src/app/**/*.test.ts,src/app/**/*.test.tsx,scripts/*handoff-bundle.ps1,scripts/parse-pipeline-latency*.mjs
