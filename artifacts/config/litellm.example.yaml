# LiteLLM — пример конфигурации (без секретов)
# Каноничный файл: %USERPROFILE%\.litellm\config.yaml
model_list:
  - model_name: "review-default"
    litellm_params:
      model: "openrouter/<ваша-модель>"
      api_key: "os.environ/OPENROUTER_API_KEY"
      max_tokens: 260
      temperature: 0.1
  - model_name: "llama3.2"
    litellm_params:
      model: "ollama/llama3.2:1b"
      api_base: "http://localhost:11434"
      max_tokens: 260
      temperature: 0

litellm_settings:
  callbacks: ["langfuse"]

environment_variables:
  LANGFUSE_PUBLIC_KEY: "os.environ/LANGFUSE_PUBLIC_KEY"
  LANGFUSE_SECRET_KEY: "os.environ/LANGFUSE_SECRET_KEY"
  LANGFUSE_HOST: "http://localhost:3000"
