# CI для проверки качества документации.
name: "CI: Документация"
on:
  push:
    branches: [main]
    paths: ['**.md', '.github/workflows/ci-docs.yml']
  pull_request:
    paths: ['**.md']

jobs:
  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: '**/*.md'
          config: '.markdownlint.json'

  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: lycheeverse/lychee-action@v2
        with:
          args: '--no-progress --exclude-path node_modules --exclude-path .git **/*.md'
          fail: true
