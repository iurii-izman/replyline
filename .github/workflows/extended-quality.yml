name: Extended Quality

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * 1'

jobs:
  extended-quality:
    runs-on: windows-latest
    timeout-minutes: 60
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - uses: pnpm/action-setup@v5
        with:
          version: 9
      - uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install cargo-deny and cargo-audit
        run: cargo install --locked cargo-deny cargo-audit
      - name: Extended verification gate (opt-in)
        run: pnpm verify:extended
      - name: Optional API lane
        run: pnpm test:optional:api
