name: Extended Quality

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * 1"

concurrency:
  group: extended-quality
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  extended-quality:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 9.15.9
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Check toolchain versions
        run: |
          node --version
          pnpm --version
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browser
        run: pnpm exec playwright install chromium
      - name: Install cargo-deny and cargo-audit
        shell: pwsh
        run: |
          if (-not (Get-Command cargo-deny -ErrorAction SilentlyContinue)) {
            cargo install --locked cargo-deny
          }
          if (-not (Get-Command cargo-audit -ErrorAction SilentlyContinue)) {
            cargo install --locked cargo-audit
          }
          cargo deny --version
          cargo audit --version
      - name: Run pnpm verify:full
        id: verify_full
        continue-on-error: true
        shell: pwsh
        run: |
          $logPath = Join-Path $env:RUNNER_TEMP "verify-full.log"
          pnpm verify:full *>&1 | Tee-Object -FilePath $logPath
          exit $LASTEXITCODE
      - name: Run pnpm verify:extended addon lane
        id: verify_extended
        continue-on-error: true
        shell: pwsh
        run: |
          $logPath = Join-Path $env:RUNNER_TEMP "verify-extended.log"
          pnpm verify:extended *>&1 | Tee-Object -FilePath $logPath
          exit $LASTEXITCODE
      - name: Extended quality summary
        if: always()
        shell: pwsh
        run: |
          $failed = @()
          $addonSkipped = @{}
          $skipRegex = '\[optional-lane\] SKIP ([^:]+):'

          function Get-SkippedTools([string] $path) {
            if (-not (Test-Path -LiteralPath $path)) {
              return @()
            }

            $tools = @()
            foreach ($match in [regex]::Matches((Get-Content -LiteralPath $path -Raw), $skipRegex)) {
              $tools += $match.Groups[1].Value
            }
            return $tools | Sort-Object -Unique
          }

          if ("${{ steps.verify_full.outcome }}" -ne "success") { $failed += "verify:full" }
          if ("${{ steps.verify_extended.outcome }}" -ne "success") { $failed += "verify:extended (addon)" }

          $verifyExtendedSkipped = Get-SkippedTools (Join-Path $env:RUNNER_TEMP "verify-extended.log")
          if ($verifyExtendedSkipped.Count -gt 0) { $addonSkipped["verify:extended"] = $verifyExtendedSkipped }

          $status = if ($failed.Count -gt 0) {
            "FAIL_NON_BLOCKING"
          } elseif ($addonSkipped.Count -gt 0) {
            "PASS_WITH_SKIP"
          } else {
            "PASS"
          }

          $json = @{
            runId = "${{ github.run_id }}"
            runAttempt = "${{ github.run_attempt }}"
            workflow = "${{ github.workflow }}"
            failedLanes = $failed
            baselineLane = "verify:full"
            addonLane = "verify:extended"
            skippedOptionalAddonTools = $addonSkipped
            status = $status
            generatedAtUtc = [DateTime]::UtcNow.ToString("o")
          } | ConvertTo-Json -Depth 4
          $jsonPath = Join-Path $env:RUNNER_TEMP "extended-quality-failures.json"
          Set-Content -Path $jsonPath -Value $json -Encoding utf8

          if ($failed.Count -eq 0 -and $addonSkipped.Count -eq 0) {
            "### Extended Quality Summary`n`n- Status: PASS`n- Baseline lane (`verify:full`): passed`n- Addon lane (`verify:extended`): passed`n- Skipped optional addon tools: none" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
            Write-Host "All extended lanes passed without skips."
            exit 0
          }

          "### Extended Quality Summary" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          "- Status: $status" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          "- Baseline lane (`verify:full`): ${{ steps.verify_full.outcome }}" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          "- Addon lane (`verify:extended`): ${{ steps.verify_extended.outcome }}" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          "- Failed lanes: $(if ($failed.Count -eq 0) { 'none' } else { $failed -join ', ' })" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

          if ($addonSkipped.Count -eq 0) {
            "- Skipped optional addon tools: none" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          } else {
            "- Skipped optional addon tools:" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
            foreach ($entry in $addonSkipped.GetEnumerator() | Sort-Object Name) {
              "- $($entry.Key): $($entry.Value -join ', ')" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
            }
          }

          foreach ($lane in $failed) {
            Write-Host "::error title=Extended quality lane failed::$lane failed in non-blocking workflow"
          }

          foreach ($entry in $addonSkipped.GetEnumerator()) {
            Write-Host "::warning title=Extended quality optional tooling skipped::$($entry.Key) skipped $($entry.Value -join ', ')"
          }

          if ($failed.Count -gt 0) {
            Write-Host "::warning title=Extended quality signal::Non-blocking workflow reported failed lanes. See summary + artifact."
            exit 1
          }

          Write-Host "::warning title=Extended quality signal::Baseline passed; addon lane skipped optional tools. See summary + artifact."
          exit 0
      - name: Upload extended summary artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: extended-quality-summary-${{ github.run_id }}
          path: ${{ runner.temp }}/extended-quality-failures.json
          if-no-files-found: error
