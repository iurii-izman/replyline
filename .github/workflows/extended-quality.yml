name: Extended Quality

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * 1"

permissions:
  contents: read

jobs:
  extended-quality:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          version: 9.15.9
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Check toolchain versions
        run: |
          node --version
          pnpm --version
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browser
        run: pnpm exec playwright install chromium
      - name: Install cargo-deny and cargo-audit
        shell: pwsh
        run: |
          if (-not (Get-Command cargo-deny -ErrorAction SilentlyContinue)) {
            cargo install --locked cargo-deny
          }
          if (-not (Get-Command cargo-audit -ErrorAction SilentlyContinue)) {
            cargo install --locked cargo-audit
          }
          cargo deny --version
          cargo audit --version
      - name: Full verification profile
        id: verify_full
        continue-on-error: true
        run: pnpm verify:full
      - name: Extended verification lane (coverage + fixtures)
        id: verify_profile_extended
        continue-on-error: true
        run: pnpm verify:extended
      - name: Optional web e2e lane
        id: optional_e2e_web
        continue-on-error: true
        run: pnpm test:optional:e2e:web
      - name: Optional desktop e2e lane
        id: optional_e2e_desktop
        continue-on-error: true
        run: pnpm test:optional:e2e:desktop
      - name: Experimental lane
        id: experimental_lane
        continue-on-error: true
        run: pnpm test:experimental
      - name: Extended quality summary
        if: always()
        shell: pwsh
        run: |
          $failed = @()
          if ("${{ steps.verify_full.outcome }}" -ne "success") { $failed += "verify:full" }
          if ("${{ steps.verify_profile_extended.outcome }}" -ne "success") { $failed += "verify:profile:extended" }
          if ("${{ steps.optional_e2e_web.outcome }}" -ne "success") { $failed += "test:optional:e2e:web" }
          if ("${{ steps.optional_e2e_desktop.outcome }}" -ne "success") { $failed += "test:optional:e2e:desktop" }
          if ("${{ steps.experimental_lane.outcome }}" -ne "success") { $failed += "test:experimental" }

          $json = @{
            runId = "${{ github.run_id }}"
            runAttempt = "${{ github.run_attempt }}"
            workflow = "${{ github.workflow }}"
            failedLanes = $failed
            status = $(if ($failed.Count -eq 0) { "PASS" } else { "FAIL_NON_BLOCKING" })
            generatedAtUtc = [DateTime]::UtcNow.ToString("o")
          } | ConvertTo-Json -Depth 4
          $jsonPath = Join-Path $env:RUNNER_TEMP "extended-quality-failures.json"
          Set-Content -Path $jsonPath -Value $json -Encoding utf8

          if ($failed.Count -eq 0) {
            "### Extended Quality Summary`n`n- Status: PASS`n- Failed lanes: none" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
            Write-Host "All non-blocking lanes passed."
            exit 0
          }

          "### Extended Quality Summary`n`n- Status: FAIL (non-blocking)`n- Failed lanes:" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          foreach ($lane in $failed) {
            "- $lane" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
            Write-Host "::error title=Extended quality lane failed::$lane failed in non-blocking workflow"
          }

          Write-Host "::warning title=Extended quality signal::Non-blocking workflow reported failed lanes. See summary + artifact."
          exit 1
      - name: Upload extended summary artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: extended-quality-summary-${{ github.run_id }}
          path: ${{ runner.temp }}/extended-quality-failures.json
          if-no-files-found: error
