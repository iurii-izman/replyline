name: Experimental Nightly

on:
  workflow_dispatch:
  schedule:
    - cron: '30 3 * * *'

jobs:
  experimental-nightly:
    runs-on: windows-latest
    timeout-minutes: 90
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - uses: pnpm/action-setup@v5
        with:
          version: 9
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Experimental lane (nightly opt-in)
        run: pnpm test:experimental
      - name: Upload experimental artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: experimental-artifacts-${{ github.run_id }}
          path: |
            artifacts/**
            reports/**
            test-results/**
          if-no-files-found: warn
