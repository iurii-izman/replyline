# CI для базовых security-проверок репозитория.
name: "CI: Безопасность"
on:
  push:
    branches: [main]
  pull_request:

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  filenames-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: "Проверка: нет .env файлов с секретами"
        run: |
          # Проверяем что нет .env файлов (кроме .env.keys и .env.example)
          found=$(find . -name '.env' -o -name '.env.local' -o -name '.env.production' | grep -v node_modules || true)
          if [ -n "$found" ]; then
            echo "::error::Найдены .env файлы с потенциальными секретами: $found"
            exit 1
          fi
