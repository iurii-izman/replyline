name: Release On Tag

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing Git tag to publish as release (for example: v0.2.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  resolve-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: resolve
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify tag exists
        shell: bash
        run: |
          git fetch --tags --force
          git rev-parse "refs/tags/${{ steps.resolve.outputs.tag }}"

  release-notes:
    needs: resolve-tag
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub release with generated notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ needs.resolve-tag.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release for $TAG already exists. Skipping create."
            exit 0
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            --latest

  windows-artifact:
    needs:
      - resolve-tag
      - release-notes
    runs-on: windows-latest
    env:
      TAG: ${{ needs.resolve-tag.outputs.tag }}
      WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
    steps:
      - name: Checkout tag
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          version: 9.15.9

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prebuild verification gate
        run: pnpm verify:fast

      - name: Prepare optional signing certificate
        id: signing
        shell: pwsh
        run: |
          $hasCert = -not [string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE)
          $hasPass = -not [string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_PASSWORD)

          if ($hasCert -and $hasPass) {
            $bytes = [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
            $certPath = Join-Path $env:RUNNER_TEMP 'windows-signing-cert.pfx'
            [IO.File]::WriteAllBytes($certPath, $bytes)
            "eligible=true" >> $env:GITHUB_OUTPUT
            "cert_path=$certPath" >> $env:GITHUB_OUTPUT
            "cert_password=$env:WINDOWS_CERTIFICATE_PASSWORD" >> $env:GITHUB_OUTPUT
          } else {
            "eligible=false" >> $env:GITHUB_OUTPUT
            "cert_path=" >> $env:GITHUB_OUTPUT
            "cert_password=" >> $env:GITHUB_OUTPUT
          }

      - name: Build unsigned Windows artifacts
        if: steps.signing.outputs.eligible != 'true'
        run: pnpm tauri build

      - name: Build signing-eligible Windows artifacts
        if: steps.signing.outputs.eligible == 'true'
        env:
          TAURI_WINDOWS_CERTIFICATE_PATH: ${{ steps.signing.outputs.cert_path }}
          TAURI_WINDOWS_CERTIFICATE_PASSWORD: ${{ steps.signing.outputs.cert_password }}
        run: pnpm tauri build

      - name: Determine signing status and package release artifact
        id: package
        shell: pwsh
        run: |
          $bundleRoot = Join-Path $PWD 'src-tauri/target/release/bundle'
          if (-not (Test-Path -LiteralPath $bundleRoot)) {
            throw "Expected Tauri bundle output path not found: $bundleRoot"
          }

          $signed = $false
          $installerCandidates = @()
          $installerCandidates += Get-ChildItem -Path $bundleRoot -Recurse -File -Filter *.msi -ErrorAction SilentlyContinue
          $installerCandidates += Get-ChildItem -Path $bundleRoot -Recurse -File -Filter *.exe -ErrorAction SilentlyContinue

          foreach ($file in $installerCandidates) {
            $sig = Get-AuthenticodeSignature -FilePath $file.FullName
            if ($sig.Status -eq 'Valid') {
              $signed = $true
              break
            }
          }

          $posture = if ($signed) { 'signed' } else { 'internal-unsigned' }
          $artifactName = "Replyline-$env:TAG-windows-$posture"
          $artifactDir = Join-Path $env:RUNNER_TEMP $artifactName
          New-Item -Path $artifactDir -ItemType Directory -Force | Out-Null

          Copy-Item -Path (Join-Path $bundleRoot '*') -Destination $artifactDir -Recurse -Force
          if (Test-Path -LiteralPath 'src-tauri/target/release/replyline.exe') {
            Copy-Item -LiteralPath 'src-tauri/target/release/replyline.exe' -Destination $artifactDir -Force
          }

          $zipPath = Join-Path $env:RUNNER_TEMP ("$artifactName.zip")
          if (Test-Path -LiteralPath $zipPath) {
            Remove-Item -LiteralPath $zipPath -Force
          }
          Compress-Archive -Path (Join-Path $artifactDir '*') -DestinationPath $zipPath -Force

          "signed=$($signed.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          "posture=$posture" >> $env:GITHUB_OUTPUT
          "artifact_name=$artifactName" >> $env:GITHUB_OUTPUT
          "artifact_zip=$zipPath" >> $env:GITHUB_OUTPUT

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.package.outputs.artifact_name }}
          path: ${{ steps.package.outputs.artifact_zip }}
          if-no-files-found: error

      - name: Attach artifact to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ needs.resolve-tag.outputs.tag }}"
          gh release upload "$TAG" "${{ steps.package.outputs.artifact_zip }}" --clobber

      - name: Publish release summary
        shell: bash
        run: |
          if [ "${{ steps.package.outputs.signed }}" = "true" ]; then
            ELIGIBLE="yes"
          else
            ELIGIBLE="no"
          fi

          {
            echo "## Windows release artifact";
            echo "- tag: ${{ needs.resolve-tag.outputs.tag }}";
            echo "- signed: ${{ steps.package.outputs.signed }}";
            echo "- artifact: ${{ steps.package.outputs.artifact_name }}.zip";
            echo "- artifact path: ${{ steps.package.outputs.artifact_zip }}";
            echo "- public beta eligible: $ELIGIBLE";
          } >> "$GITHUB_STEP_SUMMARY"
