name: Release On Tag

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing Git tag to publish as release (for example: v0.2.0)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  resolve-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: resolve
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify tag exists
        shell: bash
        run: |
          git fetch --tags --force
          git rev-parse "refs/tags/${{ steps.resolve.outputs.tag }}"

  release-notes:
    needs: resolve-tag
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tag
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}
          fetch-depth: 0

      - name: Create GitHub release with generated notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ needs.resolve-tag.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release for $TAG already exists. Skipping create."
            exit 0
          fi

          RELEASE_ARGS=(--verify-tag --title "Replyline ${TAG#v}")
          NOTES_FILE="docs/releases/$TAG.md"

          if [[ "$TAG" == *-* ]]; then
            RELEASE_ARGS+=(--prerelease)
          else
            RELEASE_ARGS+=(--latest)
          fi

          if [[ -f "$NOTES_FILE" ]]; then
            RELEASE_ARGS+=(--notes-file "$NOTES_FILE")
          else
            RELEASE_ARGS+=(--generate-notes)
          fi

          gh release create "$TAG" "${RELEASE_ARGS[@]}"

  windows-artifact:
    needs:
      - resolve-tag
      - release-notes
    permissions:
      contents: write
    runs-on: windows-latest
    timeout-minutes: 90
    env:
      TAG: ${{ needs.resolve-tag.outputs.tag }}
    steps:
      - name: Checkout tag
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          version: 9.15.9

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache Cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install cargo-deny and cargo-audit
        shell: pwsh
        run: |
          if (-not (Get-Command cargo-deny -ErrorAction SilentlyContinue)) {
            cargo install --locked cargo-deny
          }
          if (-not (Get-Command cargo-audit -ErrorAction SilentlyContinue)) {
            cargo install --locked cargo-audit
          }
          cargo deny --version
          cargo audit --version

      - name: Release-quality verification gate
        run: pnpm verify:full

      - name: Prepare optional signing certificate
        id: signing
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $hasCert = -not [string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE)
          $hasPass = -not [string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_PASSWORD)

          if ($hasCert -and $hasPass) {
            $certDir = Join-Path $env:RUNNER_TEMP 'replyline-signing'
            New-Item -Path $certDir -ItemType Directory -Force | Out-Null
            $encodedPath = Join-Path $certDir 'certificate-base64.txt'
            $certPath = Join-Path $certDir 'certificate.pfx'
            Set-Content -LiteralPath $encodedPath -Value $env:WINDOWS_CERTIFICATE -Encoding ascii
            certutil -decode $encodedPath $certPath | Out-Null
            if ($LASTEXITCODE -ne 0) {
              throw "Unable to decode WINDOWS_CERTIFICATE."
            }

            $securePassword = ConvertTo-SecureString `
              -String $env:WINDOWS_CERTIFICATE_PASSWORD `
              -Force `
              -AsPlainText
            $importedCertificate = @(
              Import-PfxCertificate `
                -FilePath $certPath `
                -CertStoreLocation 'Cert:\CurrentUser\My' `
                -Password $securePassword
            ) | Where-Object HasPrivateKey | Select-Object -First 1

            if ($null -eq $importedCertificate) {
              throw "Imported signing certificate does not contain a private key."
            }

            $signingConfigPath = Join-Path $certDir 'tauri.signing.conf.json'
            @{
              bundle = @{
                windows = @{
                  certificateThumbprint = $importedCertificate.Thumbprint
                  digestAlgorithm = 'sha256'
                  timestampUrl = 'http://timestamp.digicert.com'
                }
              }
            } | ConvertTo-Json -Depth 4 | Set-Content -LiteralPath $signingConfigPath -Encoding utf8

            "eligible=true" >> $env:GITHUB_OUTPUT
            "certificate_thumbprint=$($importedCertificate.Thumbprint)" >> $env:GITHUB_OUTPUT
            "config_path=$signingConfigPath" >> $env:GITHUB_OUTPUT
          } else {
            "eligible=false" >> $env:GITHUB_OUTPUT
            "certificate_thumbprint=" >> $env:GITHUB_OUTPUT
            "config_path=" >> $env:GITHUB_OUTPUT
          }

      - name: Build unsigned Windows artifacts
        if: steps.signing.outputs.eligible != 'true'
        run: pnpm tauri build

      - name: Build signing-eligible Windows artifacts
        if: steps.signing.outputs.eligible == 'true'
        run: pnpm tauri build --config "${{ steps.signing.outputs.config_path }}"

      - name: Determine signing status and package release artifact
        id: package
        shell: pwsh
        run: |
          $bundleRoot = Join-Path $PWD 'src-tauri/target/release/bundle'
          if (-not (Test-Path -LiteralPath $bundleRoot)) {
            throw "Expected Tauri bundle output path not found: $bundleRoot"
          }

          $installerCandidates = @()
          $installerCandidates += Get-ChildItem -Path $bundleRoot -Recurse -File -Filter *.msi -ErrorAction SilentlyContinue
          $installerCandidates += Get-ChildItem -Path $bundleRoot -Recurse -File -Filter *.exe -ErrorAction SilentlyContinue
          if (Test-Path -LiteralPath 'src-tauri/target/release/replyline.exe') {
            $installerCandidates += Get-Item -LiteralPath 'src-tauri/target/release/replyline.exe'
          }

          $signed = $installerCandidates.Count -gt 0
          foreach ($file in $installerCandidates) {
            $sig = Get-AuthenticodeSignature -FilePath $file.FullName
            if ($sig.Status -ne 'Valid') {
              $signed = $false
              break
            }
          }

          $posture = if ($signed) { 'signed' } else { 'internal-unsigned' }
          $artifactName = if ($signed) {
            "Replyline-$env:TAG-windows-signed"
          } else {
            "Replyline-$env:TAG-windows-internal-unsigned"
          }
          $artifactDir = Join-Path $env:RUNNER_TEMP $artifactName
          New-Item -Path $artifactDir -ItemType Directory -Force | Out-Null

          Copy-Item -Path (Join-Path $bundleRoot '*') -Destination $artifactDir -Recurse -Force
          if (Test-Path -LiteralPath 'src-tauri/target/release/replyline.exe') {
            Copy-Item -LiteralPath 'src-tauri/target/release/replyline.exe' -Destination $artifactDir -Force
          }

          $zipPath = Join-Path $env:RUNNER_TEMP ("$artifactName.zip")
          if (Test-Path -LiteralPath $zipPath) {
            Remove-Item -LiteralPath $zipPath -Force
          }
          Compress-Archive -Path (Join-Path $artifactDir '*') -DestinationPath $zipPath -Force
          $checksumPath = "$zipPath.sha256"
          $hash = (Get-FileHash -LiteralPath $zipPath -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $(Split-Path -Leaf $zipPath)" | Set-Content -LiteralPath $checksumPath -Encoding ascii

          "signed=$($signed.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          "posture=$posture" >> $env:GITHUB_OUTPUT
          "artifact_name=$artifactName" >> $env:GITHUB_OUTPUT
          "artifact_zip=$zipPath" >> $env:GITHUB_OUTPUT
          "artifact_checksum=$checksumPath" >> $env:GITHUB_OUTPUT

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.package.outputs.artifact_name }}
          path: |
            ${{ steps.package.outputs.artifact_zip }}
            ${{ steps.package.outputs.artifact_checksum }}
          if-no-files-found: error

      - name: Attach signed artifact to GitHub release
        if: steps.package.outputs.signed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ needs.resolve-tag.outputs.tag }}"
          gh release upload "$TAG" \
            "${{ steps.package.outputs.artifact_zip }}" \
            "${{ steps.package.outputs.artifact_checksum }}" \
            --clobber

      - name: Keep unsigned artifact internal
        if: steps.package.outputs.signed != 'true'
        shell: bash
        run: |
          echo "Unsigned package remains a workflow artifact and is not attached to the public release."

      - name: Publish release summary
        shell: bash
        run: |
          if [ "${{ steps.package.outputs.signed }}" = "true" ]; then
            ELIGIBLE="yes"
          else
            ELIGIBLE="no"
          fi

          {
            echo "## Windows release artifact";
            echo "- tag: ${{ needs.resolve-tag.outputs.tag }}";
            echo "- signed: ${{ steps.package.outputs.signed }}";
            echo "- artifact: ${{ steps.package.outputs.artifact_name }}.zip";
            echo "- checksum: ${{ steps.package.outputs.artifact_name }}.zip.sha256";
            echo "- artifact path: ${{ steps.package.outputs.artifact_zip }}";
            echo "- public beta eligible: $ELIGIBLE";
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Remove imported signing certificate
        if: always() && steps.signing.outputs.eligible == 'true'
        shell: pwsh
        run: |
          $thumbprint = '${{ steps.signing.outputs.certificate_thumbprint }}'
          if (-not [string]::IsNullOrWhiteSpace($thumbprint)) {
            Remove-Item -LiteralPath "Cert:\CurrentUser\My\$thumbprint" -Force -ErrorAction SilentlyContinue
          }
