name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  public-footprint-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Public footprint guard
        run: node scripts/check-public-footprint.mjs

  verify:
    needs: public-footprint-guard
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          version: 9.15.9

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install cargo-deny and cargo-audit
        run: cargo install --locked cargo-deny cargo-audit

      - name: Local quality and security gate (fail-fast)
        run: pnpm verify:fast

      - name: Install optional Playwright tooling
        if: success()
        run: |
          pnpm install --frozen-lockfile --include=optional
          pnpm exec playwright install chromium

      - name: Credential-free web e2e (blocking)
        if: success()
        run: pnpm test:e2e:web

      - name: Fetch base ref for release-freeze check
        if: success() || failure()
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'pull_request') {
            $baseRef = '${{ github.event.pull_request.base.sha }}'
            Write-Host "Fetching PR base: $baseRef"
            git fetch origin "$baseRef" --depth=1 --no-tags
          } elseif ('${{ github.event_name }}' -eq 'push') {
            $beforeSha = '${{ github.event.before }}'
            if ($beforeSha -and $beforeSha -ne '0000000000000000000000000000000000000000') {
              Write-Host "Fetching previous commit: $beforeSha"
              git fetch origin "$beforeSha" --depth=1 --no-tags
            } else {
              Write-Host "No previous commit available (first push or force-push) — will use HEAD~1"
              git fetch --depth=2 --no-tags
            }
          }

      - name: Release-freeze guardrail check
        if: success() || failure()
        id: release_freeze
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'pull_request') {
            $baseRef = '${{ github.event.pull_request.base.sha }}'
            Write-Host "release-freeze: comparing PR head against base $baseRef"
            pnpm release:freeze:check:strict -- --base "$baseRef"
          } elseif ('${{ github.event_name }}' -eq 'push') {
            $beforeSha = '${{ github.event.before }}'
            if ($beforeSha -and $beforeSha -ne '0000000000000000000000000000000000000000') {
              Write-Host "release-freeze: comparing HEAD against previous commit $beforeSha"
              pnpm release:freeze:check:strict -- --base "$beforeSha"
            } else {
              Write-Host "release-freeze: comparing HEAD against HEAD~1"
              pnpm release:freeze:check:strict -- --base HEAD~1
            }
          } else {
            Write-Host "release-freeze: workflow_dispatch — comparing working tree against HEAD"
            pnpm release:freeze:check:strict
          }

      - name: Upload release-freeze artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-freeze-check-${{ github.run_id }}
          path: reports/release-freeze-check.json
          if-no-files-found: warn

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: verify-artifacts-${{ github.run_id }}
          path: |
            artifacts/**
            test-results/**
          if-no-files-found: warn
