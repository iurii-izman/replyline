name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Cargo check
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      - name: Rust format check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: UI tests with coverage
        run: pnpm test:ui:coverage

      - name: Fixture checks
        run: pnpm test:fixtures

      - name: Prompt contract
        run: pnpm test:prompt-contract

      - name: Say-now scenarios
        run: pnpm test:say-now-scenarios

      - name: Fixture gate (LLM-backed, informational)
        if: env.OPENROUTER_API_KEY != ''
        continue-on-error: true
        env:
          REPLYLINE_FIXTURE_GATE: "1"
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          REPLYLINE_FIXTURE_IDS: "client-pushback-1,scope-1,salary-1"
        run: pnpm test:fixture-gate

      - name: IPC contract gate
        run: pnpm test:ipc-contract

      - name: Consistency gate
        run: pnpm test:consistency

      - name: Copy discipline check
        run: pnpm copy:check

      - name: Install cargo-binstall
        run: |
          Set-ExecutionPolicy Bypass -Scope Process -Force
          irm https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.ps1 | iex
        continue-on-error: true

      - name: Install cargo-deny and cargo-audit
        run: cargo binstall cargo-deny cargo-audit --no-confirm --log-level info
        continue-on-error: true

      - name: Rust supply chain check
        run: pnpm rust:deps
        continue-on-error: true

      - name: npm audit
        run: pnpm audit --audit-level=high
        continue-on-error: true
