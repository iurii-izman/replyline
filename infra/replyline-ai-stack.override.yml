services:
  langfuse-worker:
    container_name: replyline-langfuse-worker
    labels: &replyline-labels
      com.replyline.managed: "true"
      com.replyline.project: "replyline"
      com.replyline.stack: "ai-bridge"
    environment:
      NEXTAUTH_URL: http://localhost:13000
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://localhost:19090

  langfuse-web:
    container_name: replyline-langfuse-web
    labels: *replyline-labels
    ports: !override
      - "13000:3000"
    environment:
      NEXTAUTH_URL: http://localhost:13000

  langfuse-db:
    container_name: replyline-langfuse-db
    labels: *replyline-labels
    ports: !override
      - "127.0.0.1:15433:5432"

  langfuse-clickhouse:
    container_name: replyline-langfuse-clickhouse
    labels: *replyline-labels
    ports: !override
      - "127.0.0.1:18123:8123"
      - "127.0.0.1:19009:9000"

  langfuse-minio:
    container_name: replyline-langfuse-minio
    labels: *replyline-labels
    ports: !override
      - "19090:9000"
      - "127.0.0.1:19091:9001"

  langfuse-redis:
    container_name: replyline-langfuse-redis
    labels: *replyline-labels
    ports: !override
      - "127.0.0.1:16379:6379"

  langfuse-minio-init:
    container_name: replyline-langfuse-minio-init
    labels: *replyline-labels

  qdrant:
    container_name: replyline-qdrant
    labels: *replyline-labels
    ports: !override
      - "16333:6333"
      - "16334:6334"
