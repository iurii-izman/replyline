services:
  langfuse-web:
    image: langfuse/langfuse:3.184.1@sha256:94c7638f4db988404ce768988af3138d30c70c767ac5a4001fc1ea8e868d3b6b
    container_name: !reset null
    labels:
      com.replyline.managed: "true"
      com.replyline.project: "replyline"
      com.replyline.stack: "ai-bridge"
    ports: !override
      - "127.0.0.1:13000:3000"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch(`http://$${process.env.HOSTNAME}:3000/api/public/health`).then((response)=>{if(!response.ok)process.exit(1)}).catch(()=>process.exit(1))
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  langfuse-worker:
    image: langfuse/langfuse-worker:3.184.1@sha256:e4fd8241c2cced66c92ce86e09e9d7537733de05e16c49b3324875b5ddb6028b
    container_name: !reset null
    labels:
      com.replyline.managed: "true"
      com.replyline.project: "replyline"
      com.replyline.stack: "ai-bridge"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch(`http://$${process.env.HOSTNAME}:3030/api/health`).then((response)=>{if(!response.ok)process.exit(1)}).catch(()=>process.exit(1))
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  langfuse-db:
    image: postgres:17-alpine@sha256:979c4379dd698aba0b890599a6104e082035f98ef31d9b9291ec22f2b13059ca
    container_name: !reset null
    labels:
      com.replyline.managed: "true"
      com.replyline.project: "replyline"
      com.replyline.stack: "ai-bridge"
    ports: !override
      - "127.0.0.1:15433:5432"

  langfuse-redis:
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    container_name: !reset null
    environment:
      REDIS_AUTH: ${REDIS_AUTH:?Set REDIS_AUTH in .env}
    labels:
      com.replyline.managed: "true"
      com.replyline.project: "replyline"
      com.replyline.stack: "ai-bridge"
    ports: !override
      - "127.0.0.1:16379:6379"

  langfuse-clickhouse:
    image: clickhouse/clickhouse-server:26.5.1.882@sha256:07afc18d8a9706eb9d85c5c5d2752e5270f91bbc2894caeaecb73e4d0f603bf5
    container_name: !reset null
    labels:
      com.replyline.managed: "true"
      com.replyline.project: "replyline"
      com.replyline.stack: "ai-bridge"
    ports: !override
      - "127.0.0.1:18123:8123"
      - "127.0.0.1:19009:9000"

  langfuse-minio-permissions:
    image: alpine:3.22@sha256:310c62b5e7ca5b08167e4384c68db0fd2905dd9c7493756d356e893909057601
    user: "0"
    command:
      - sh
      - -c
      - if [ ! -f /data/.replyline-owner-65532 ]; then chown -R 65532:65532 /data && touch /data/.replyline-owner-65532 && chown 65532:65532 /data/.replyline-owner-65532; fi
    labels:
      com.replyline.managed: "true"
      com.replyline.project: "replyline"
      com.replyline.stack: "ai-bridge"
    volumes:
      - langfuse-minio-data:/data
    restart: "no"

  langfuse-minio:
    image: cgr.dev/chainguard/minio:latest@sha256:626f73abb00da35765ae77b3dfcd221375b286e956a6bf4e0969a9c16cb5fc1f
    container_name: !reset null
    entrypoint: sh
    command:
      - -c
      - mkdir -p /data/langfuse && minio server --address ":9000" --console-address ":9001" /data
    depends_on:
      langfuse-minio-permissions:
        condition: service_completed_successfully
    labels:
      com.replyline.managed: "true"
      com.replyline.project: "replyline"
      com.replyline.stack: "ai-bridge"
    ports: !override
      - "127.0.0.1:19090:9000"
      - "127.0.0.1:19091:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 3s

  langfuse-minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
    container_name: !reset null
    labels:
      com.replyline.managed: "true"
      com.replyline.project: "replyline"
      com.replyline.stack: "ai-bridge"

  qdrant:
    image: qdrant/qdrant:v1.18.2@sha256:75eab8c4ba42096724fdcfde8b4de0b5713d529dde32f285a1f86fdcb2c9e50c
    container_name: !reset null
    labels:
      com.replyline.managed: "true"
      com.replyline.project: "replyline"
      com.replyline.stack: "ai-bridge"
    ports: !override
      - "127.0.0.1:16333:6333"
      - "127.0.0.1:16334:6334"
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/6333"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
