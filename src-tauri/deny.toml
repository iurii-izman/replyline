[graph]
all-features = true

[output]
feature-depth = 1

[advisories]
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
unmaintained = "workspace"
ignore = [
    # REVIEW_DATE=2026-07-01; reason=Tauri/wry GTK3 stack is transitive on Linux and not used on primary Windows target.
    { crate = "fastrand@2.4.0", reason = "yanked transitive crate; locked by upstream tree until next dependency refresh." },
    # REVIEW_DATE=2026-07-07; reason=Wayland clipboard transitives are Linux-only while Replyline's supported primary target is Windows-first desktop.
    { id = "RUSTSEC-2026-0194", reason = "Remaining vulnerable quick-xml path is transitively pulled by wayland-scanner for Linux clipboard support; plist-backed build-time path was upgraded to quick-xml 0.41.0." },
    # REVIEW_DATE=2026-07-07; reason=Wayland namespace parsing path is Linux-only and currently constrained to upstream tauri/arboard dependency chain.
    { id = "RUSTSEC-2026-0195", reason = "Remaining vulnerable quick-xml path is transitively pulled by wayland-scanner for Linux clipboard support; upstream upgrade required for full removal." },
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "OpenSSL",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
skip = []
skip-tree = [
    # REVIEW_DATE=2026-07-01; reason=Windows beta target. Suppress noisy GUI-stack duplicates from tauri/wry transitives; keep warnings focused on actionable crate drift in our direct dependency surface.
    { name = "tauri" },
    { name = "tauri-runtime-wry" },
    { name = "wry" },
]

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
